    (() => {

        const shouldUseDarkMode =
          storedTheme === "dark" || ((storedTheme !== "dark" && storedTheme !== "light") && prefersDark);
        if (shouldUseDarkMode) {
          document.documentElement.classList.add("dark-mode");
        }
      } catch {}
    })();
  </script>
